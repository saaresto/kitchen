spring:
  application:
    name: kitchen-admin
  main:
    lazy-initialization: true
  thymeleaf:
    cache: true

  # Database Configuration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/kitchen}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PWD:postgres}
    driver-class-name: org.postgresql.Driver

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Exposed Configuration
  exposed:
    generate-ddl: false

  # Security Configuration
  security:
    user:
      name: ${ADMIN_NAME:admin}
      password: ${ADMIN_PWD:admin}

logging:
  level:
    org:
      springframework:
        boot:
          web: INFO
    okhttp3: WARN
    okio: WARN

notification:
  token: ${NOTIFICATION_TOKEN:adminadminadmin}
# Server Configuration
server:
  port: ${PORT:8080}
  address: 0.0.0.0
  # Optimize server for memory usage
  tomcat:
    threads:
      max: 50
      min-spare: 5
    max-connections: 100
    connection-timeout: 20000
    max-http-form-post-size: 2MB
    max-swallow-size: 2MB

# Swagger UI / OpenAPI Configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  api-docs:
    path: /api-docs

# Actuator Configuration
management:
  health:
    db:
      enabled: false
    diskspace:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: false
      show-details: always
